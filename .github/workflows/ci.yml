name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  POETRY_VERSION: "1.8.5"

jobs:
  quality:
    name: Quality (Lint / Typecheck / Tests)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install "poetry==${POETRY_VERSION}"

      - name: Initialize template
        run: |
          PROJECT_NAME="Template API" \
          PROJECT_SLUG="template_api" \
          SERVICE_NAME="template-api" \
          OWNER="template-owner" \
          DESCRIPTION="FastAPI base template" \
          make init

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock', 'pyproject.toml') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --with dev

      - name: Validate Poetry metadata and lock
        run: |
          poetry check
          if [ -f poetry.lock ]; then
            poetry check --lock
          else
            echo "poetry.lock not found; generating one for this CI run"
            poetry lock
          fi

      - name: Format check (black)
        run: poetry run black --check src/ tests/

      - name: Lint (ruff)
        run: poetry run ruff check src/ tests/

      - name: Typecheck (pyright)
        run: poetry run pyright src/

      - name: Apply migrations (sqlite)
        run: poetry run alembic upgrade head

      - name: Unit + Integration tests
        run: poetry run pytest tests/unit tests/integration --cov=src --cov-report=xml
        env:
          APP_ENVIRONMENT: test
          APP_DEBUG: "false"
          APP_DATABASE_URL: sqlite+aiosqlite:///./ci.db
          APP_DATABASE_AUTO_CREATE_SCHEMA: "true"
          APP_DATABASE_CONNECT_ON_STARTUP: "false"

      - name: Production launcher smoke test
        run: |
          set -euo pipefail
          APP_ENVIRONMENT=test \
          APP_DEBUG=false \
          APP_AUTH_ENABLED=false \
          APP_DATABASE_URL=sqlite+aiosqlite:///./ci-prod.db \
          APP_DATABASE_AUTO_CREATE_SCHEMA=true \
          APP_API_DOCS_ENABLED=false \
          APP_WEB_CONCURRENCY=1 \
          APP_PORT=8010 \
          poetry run bash scripts/run-production.sh > /tmp/prod.log 2>&1 &
          app_pid=$!
          cleanup() {
            kill "$app_pid" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 30); do
            if curl --silent --fail http://127.0.0.1:8010/health >/dev/null; then
              break
            fi
            sleep 1
          done

          curl --silent --fail http://127.0.0.1:8010/health >/dev/null
          curl --silent --fail http://127.0.0.1:8010/ready >/dev/null

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  db-postgres:
    name: DB Tests (PostgreSQL)
    runs-on: ubuntu-latest
    needs: quality

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: app
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install "poetry==${POETRY_VERSION}"

      - name: Initialize template
        run: |
          PROJECT_NAME="Template API" \
          PROJECT_SLUG="template_api" \
          SERVICE_NAME="template-api" \
          OWNER="template-owner" \
          DESCRIPTION="FastAPI base template" \
          make init

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock', 'pyproject.toml') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --with dev

      - name: Apply migrations (postgres)
        run: poetry run alembic upgrade head
        env:
          APP_ENVIRONMENT: test
          APP_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/app
          APP_DATABASE_AUTO_CREATE_SCHEMA: "false"

      - name: Database repository tests
        run: poetry run pytest tests/db -q
        env:
          APP_ENVIRONMENT: test
          APP_DEBUG: "false"
          APP_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/app
          APP_DATABASE_AUTO_CREATE_SCHEMA: "false"
          APP_DATABASE_CONNECT_ON_STARTUP: "false"

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [quality, db-postgres]

    steps:
      - uses: actions/checkout@v4

      - name: Initialize template
        run: |
          PROJECT_NAME="Template API" \
          PROJECT_SLUG="template_api" \
          SERVICE_NAME="template-api" \
          OWNER="template-owner" \
          DESCRIPTION="FastAPI base template" \
          make init

      - uses: docker/setup-buildx-action@v3

      - name: Build runtime image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          push: false
          tags: template-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
