name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Verify template has been initialized
        run: |
          unresolved="$(grep -R -n -E '__PROJECT_NAME__|__PROJECT_SLUG__|__SERVICE_NAME__|__OWNER__|__DESCRIPTION__' \
            pyproject.toml Dockerfile docker-compose.yml .github/workflows || true)"
          if [ -n "$unresolved" ]; then
            echo "Unresolved template placeholders detected. Initialize the template before creating a release:"
            echo "$unresolved"
            exit 1
          fi

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/__OWNER__/__SERVICE_NAME__
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
