services:
  __SERVICE_NAME__:
    build:
      context: .
      target: builder  # Uses the builder stage so source is editable via volume mount
    command: >
      /build/.venv/bin/uvicorn __PROJECT_SLUG__.main:app
      --host 0.0.0.0
      --port 8000
      --reload
    volumes:
      - ./src:/build/src  # Hot-reload: changes in src/ reflect immediately
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      PATH: /build/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      PYTHONPATH: /build/src
      APP_DATABASE_URL: ${APP_DATABASE_URL:-postgresql+asyncpg://postgres:postgres@postgres:5432/app}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Redis is provided as an optional dependency. Start it with:
  #   docker compose --profile with-redis up
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    profiles:
      - with-redis

volumes:
  postgres_data:
